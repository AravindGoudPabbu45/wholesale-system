# ============================================================
# Smart Inventory Management System — PRODUCTION Configuration
# All sensitive values are injected via environment variables.
# Activated with: --spring.profiles.active=prod
# ============================================================

# Server — Render injects PORT
server.port=${PORT:8080}

# Cloud Database (Clever Cloud / Railway / Aiven)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning for free-tier DB (max 5 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Disable auto schema init in production (DB already seeded)
spring.sql.init.mode=never

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT (from environment variable)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=7200000

# CORS — Vercel frontend URL (set via env var)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging (production — less verbose)
logging.level.root=WARN
logging.level.com.wholesale=INFO
logging.level.org.springframework.security=WARN

# Cache
spring.cache.type=simple
spring.cache.cache-names=products,branches,inventory

# Actuator — expose only health in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
