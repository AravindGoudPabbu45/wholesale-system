# ============================================================
# Smart Inventory Management System — PRODUCTION Configuration
# Optimized for Render Free Tier (512MB RAM limit)
# Activated with: --spring.profiles.active=prod
# ============================================================

# Server — Read dynamic PORT from Render, bind to all interfaces
server.port=${PORT:10000}
server.address=0.0.0.0

# Tomcat — CRITICAL: reduce threads to save memory
# Default 200 threads × 1MB stack = 200MB wasted!
# 10 threads is enough for a low-traffic B2B app
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

# Cloud Database (Clever Cloud)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — minimal for 512MB container
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Disable auto schema init in production (DB already seeded)
spring.sql.init.mode=never

# JPA / Hibernate — schema already exists, skip all checks
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=7200000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging — reduced to save memory
logging.level.root=WARN
logging.level.com.wholesale=INFO

# Disable cache to save heap memory
spring.cache.type=none

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
