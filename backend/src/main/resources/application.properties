# ============================================================
# Smart Inventory Management System - Application Configuration
# ============================================================

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/wholesale_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL Initialization (auto-run schema.sql + data.sql)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=YOUR_JWT_SECRET
app.jwt.expiration=7200000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.wholesale=INFO
logging.level.org.springframework.security=WARN

# ============================================================
# Spring Cache (ConcurrentMapCache — in-memory, no Redis needed)
# ============================================================
spring.cache.type=simple
spring.cache.cache-names=products,branches,inventory

# ============================================================
# Spring Boot Actuator — Health, Metrics, Info
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.info.env.enabled=true
info.app.name=Smart Inventory Management System
info.app.version=1.0.0
info.app.description=Multi-Branch B2B Wholesale Automation Platform
